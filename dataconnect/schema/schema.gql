# Refined SQL Connect Schema for Agape Sovereign Enclave 2026

type User @table(key: "uid") {
  uid: String! @default(expr: "auth.uid")
  name: String!
  email: String! @unique
  createdAt: Timestamp! @default(expr: "request.time")
  provider: String
  sovereignScore: Int @default(value: 100)
  lastLoginAt: Timestamp @default(expr: "request.time")
}

type IdentityVector @table(key: "id") {
  id: String!
  name: String!
  icon: String!
  description: String
}

type UserVectorStatus @table(key: ["user", "identityVector"]) {
  user: User!
  identityVector: IdentityVector!
  sovereigntyScore: Int! @default(value: 100)
  nukedCount: Int! @default(value: 0)
  knoxedCount: Int! @default(value: 0)
  monitoredCount: Int! @default(value: 0)
  lastScanAt: Timestamp! @default(expr: "request.time")
  statusNotes: String
}

type Finding @table {
  user: User!
  identityVector: IdentityVector!
  type: String! # e.g. "NUKED", "KNOXED", "MONITORED"
  label: String!
  detail: String!
  createdAt: Timestamp! @default(expr: "request.time")
  action: String
  status: String
}

type MonitoredEmail @table {
  user: User!
  emailAddress: String!
  status: String! @default(value: "MONITORED")
  createdAt: Timestamp! @default(expr: "request.time")
  lastCheckedAt: Timestamp
}